<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Malgun Gothic', sans-serif; margin: 0; padding: 0; overflow: hidden; }

/* ── 라이트 모드 (기본) ── */
.vc-cal { width: 100%; min-width: 340px; border-collapse: collapse; }
.vc-cal th {
    background: #1a3a5c; color: #fff; padding: 7px 0;
    text-align: center; font-size: 0.85rem; white-space: nowrap;
}
.vc-cal th.vc-sun { background: #a03030; }
.vc-cal th.vc-sat { background: #1e4499; }
.vc-cal td {
    border: 1px solid #dde3ed; vertical-align: top; padding: 4px;
    min-height: 64px; width: 14.28%; font-size: 0.78rem;
    cursor: pointer; transition: background .12s; color: #111;
}
.vc-cal td:hover { background: #e8f0fe !important; }
.vc-empty { background: #f7f8fa !important; cursor: default !important; }
.vc-empty:hover { background: #f7f8fa !important; }
.vc-today { border: 2px solid #1a7f37 !important; background: #f0fff4; }
.vc-reserved { background: #fff5f5; }
.vc-selected { background: #dbeafe !important; border: 2px solid #2563eb !important; }
.vc-num { font-weight: 700; font-size: 0.9rem; display: block; pointer-events: none; }
.vc-sun { color: #d0302a; }
.vc-sat { color: #1a5fad; }
.vc-chip {
    display: block; font-size: 0.67rem; background: #ffd0d0; color: #7b1515;
    padding: 1px 4px; border-radius: 3px; margin-top: 2px;
    pointer-events: none;
}
.vc-chip-time { display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.vc-chip-name { display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; opacity: 0.8; }

/* ── 다크 모드 (body.dark 클래스 기반 — Streamlit 테마 연동) ── */
body.dark .vc-cal th     { background: #1e3a5c; }
body.dark .vc-cal th.vc-sun { background: #7a2222; }
body.dark .vc-cal th.vc-sat { background: #1a3577; }
body.dark .vc-cal td {
    border-color: #31333f; color: #fafafa;
}
body.dark .vc-cal td:hover { background: #1e2a40 !important; }
body.dark .vc-empty        { background: #1a1c24 !important; }
body.dark .vc-empty:hover  { background: #1a1c24 !important; }
body.dark .vc-today        { border-color: #2ea043 !important; background: #0d2b1d; }
body.dark .vc-reserved     { background: #2d1a1a; }
body.dark .vc-selected     { background: #1e3a5f !important; border-color: #4d8fef !important; }
body.dark .vc-sun          { color: #ff7b7b; }
body.dark .vc-sat          { color: #7baeff; }
body.dark .vc-chip         { background: #4a1515; color: #ffb3b3; }
body.dark .vc-num          { color: #fafafa; }
</style>
<script>
/* ── Streamlit 통신 ── */
function sendMsg(type, data) {
    var msg = Object.assign({isStreamlitMessage: true, type: type}, data);
    window.parent.postMessage(msg, "*");
}

function onMsg(event) {
    if (!event.data || event.data.type !== "streamlit:render") return;
    var args = event.data.args;
    renderCalendar(args.year, args.month, args.by_date || {}, args.selected_date || "", args.today || "");
}

/* ── 테마 감지 (Streamlit 앱의 실제 배경색 기준) ── */
function detectAndApplyTheme() {
    var dark = false;
    try {
        var doc = window.parent.document;
        /* Streamlit CSS 변수 우선 */
        var cssVar = window.parent.getComputedStyle(doc.documentElement)
                             .getPropertyValue('--background-color').trim();
        var rgb = cssVar || window.parent.getComputedStyle(doc.body).backgroundColor;
        var m = rgb.match(/(\d+),\s*(\d+),\s*(\d+)/);
        if (m) {
            var lum = (0.299 * +m[1] + 0.587 * +m[2] + 0.114 * +m[3]) / 255;
            dark = lum < 0.5;
        }
        /* 달력 iframe 배경을 Streamlit 페이지 배경과 동기화 */
        document.body.style.backgroundColor =
            window.parent.getComputedStyle(doc.body).backgroundColor;
    } catch(e) {
        dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    }
    document.body.className = dark ? 'dark' : 'light';
    return dark;
}

/* ¬¬ 탭 바 fixed 포지션 적용 (오버플로우 제약 없이 항상 동작) ¬¬ */
function applyTabSticky() {
    try {
        var doc = window.parent.document;
        var bar = doc.querySelector('[data-baseweb="tab-list"]');
        if (!bar) return;
        var bg = window.parent.getComputedStyle(doc.body).backgroundColor;

        /* spacer: bar가 fixed로 빠지면 콘텐츠가 와르 올라오지 않게 보상 */
        var barH = Math.ceil(bar.getBoundingClientRect().height) || 44;
        var spacer = doc.getElementById('vc-tab-spacer');
        if (!spacer || spacer.parentNode !== bar.parentNode) {
            if (spacer && spacer.parentNode) spacer.parentNode.removeChild(spacer);
            spacer = doc.createElement('div');
            spacer.id = 'vc-tab-spacer';
            bar.parentNode.insertBefore(spacer, bar);
        }
        spacer.style.height = barH + 'px';
        spacer.style.flexShrink = '0';

        bar.style.setProperty('position', 'fixed', 'important');
        /* Streamlit 헤더 높이를 실제 DOM에서 측정 */
        var header = doc.querySelector('[data-testid="stHeader"]');
        var headerH = header ? Math.ceil(header.getBoundingClientRect().height) : 46;
        bar.style.setProperty('top', headerH + 'px', 'important');
        bar.style.setProperty('left', '0', 'important');
        bar.style.setProperty('right', '0', 'important');
        bar.style.setProperty('z-index', '999', 'important');
        bar.style.setProperty('background-color', bg, 'important');
        bar.style.setProperty('box-shadow', '0 2px 6px rgba(0,0,0,0.15)', 'important');
    } catch(e) {}
}

function pad2(n) { return n < 10 ? "0" + n : "" + n; }

function buildWeeks(year, month) {
    var firstDay  = new Date(year, month - 1, 1).getDay();
    var totalDays = new Date(year, month, 0).getDate();
    var weeks = [], week = [];
    for (var i = 0; i < firstDay; i++) week.push(0);
    for (var d = 1; d <= totalDays; d++) {
        week.push(d);
        if (week.length === 7) { weeks.push(week); week = []; }
    }
    if (week.length > 0) {
        while (week.length < 7) week.push(0);
        weeks.push(week);
    }
    return weeks;
}

function renderCalendar(year, month, by_date, selected_date, today_str) {
    detectAndApplyTheme();

    var weeks = buildWeeks(year, month);
    var html  = '<table class="vc-cal"><tr>';
    html += '<th class="vc-sun">일</th><th>월</th><th>화</th><th>수</th><th>목</th><th>금</th><th class="vc-sat">토</th>';
    html += '</tr>';

    for (var w = 0; w < weeks.length; w++) {
        html += '<tr>';
        for (var i = 0; i < 7; i++) {
            var day = weeks[w][i];
            if (day === 0) { html += '<td class="vc-empty"></td>'; continue; }
            var day_str  = year + "-" + pad2(month) + "-" + pad2(day);
            var res_list = by_date[day_str] || [];
            var is_sel   = day_str === selected_date;
            var is_today = day_str === today_str;
            var cls = [];
            if (is_sel)        cls.push("vc-selected");
            else if (is_today) cls.push("vc-today");
            if (res_list.length > 0 && !is_sel) cls.push("vc-reserved");
            var nc = (i === 0) ? "vc-sun" : (i === 6 ? "vc-sat" : "");
            var chips = "";
            for (var j = 0; j < Math.min(res_list.length, 3); j++) {
                var r = res_list[j];
                chips += '<span class="vc-chip"><span class="vc-chip-time">' + r.res_time + '~' + r.res_time_end + '</span><span class="vc-chip-name">' + r.name + '</span></span>';
            }
            if (res_list.length > 3)
                chips += '<span class="vc-chip">+' + (res_list.length - 3) + '건 더</span>';
            html += '<td class="' + cls.join(" ") + '" onclick="cellClick(\'' + day_str + '\')">';
            html += '<span class="vc-num ' + nc + '">' + day + '</span>' + chips + '</td>';
        }
        html += '</tr>';
    }
    html += '</table>';
    document.getElementById("calendar").innerHTML = html;

    setTimeout(function(){
        var t = document.querySelector('.vc-cal');
        sendMsg("streamlit:setFrameHeight", {height: (t ? Math.ceil(t.getBoundingClientRect().height) : 380) + 4});
    }, 0);

    applyTabSticky();
}

function cellClick(dateStr) {
    sendMsg("streamlit:setComponentValue", {value: dateStr, dataType: "json"});
}

window.addEventListener("message", onMsg);
window.addEventListener("DOMContentLoaded", function() {
    sendMsg("streamlit:componentReady", {apiVersion: 1});
    detectAndApplyTheme();
    setTimeout(applyTabSticky, 800);
    setTimeout(applyTabSticky, 2000);
    setTimeout(applyTabSticky, 4000);
    setTimeout(applyTabSticky, 7000);
});
</script>
</head>
<body>
<div id="calendar" style="overflow-x:auto;-webkit-overflow-scrolling:touch;"></div>
</body>
</html>
